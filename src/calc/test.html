<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>計算エンジン ブラウザ動作確認</title>
<style>
  body { font-family: sans-serif; margin: 24px; background: #f6f5f0; color: #1f2823; }
  h1 { font-size: 18px; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 24px; background: #fff; }
  th, td { border: 1px solid #d9d6cc; padding: 6px 10px; font-size: 13px; text-align: left; vertical-align: top; }
  th { background: #eee; }
  tr.pass td.result { color: #2e6e4e; font-weight: bold; }
  tr.fail td.result { color: #b3402e; font-weight: bold; }
  .summary { font-size: 15px; font-weight: bold; margin-bottom: 12px; }
  .note { font-size: 12px; color: #5a625c; margin-bottom: 12px; }
</style>
</head>
<body>
<h1>計算エンジン ブラウザ動作確認(手取りのホント(仮))</h1>
<p class="note">
  Node.jsが使えないローカル環境用の簡易テストランナーです。<code>py -m http.server</code> 等で
  このディレクトリを配信し、ブラウザで <code>http://localhost:&lt;port&gt;/src/calc/test.html</code> を
  開いて実行してください(file://直接オープンだとESモジュールのfetchがCORSでブロックされます)。
  CI(GitHub Actions)ではnode --testによる自動テストを別途使用します。
</p>
<div id="summary" class="summary">実行中...</div>
<table id="result-table">
  <thead>
    <tr><th>#</th><th>種別</th><th>ケース</th><th>期待値</th><th>実際の値</th><th class="result">結果</th></tr>
  </thead>
  <tbody id="result-body"></tbody>
</table>

<script type="module">
  import { lookupSalaryIncomeDeduction, calculateSalaryIncome } from './salary-income.js';
  import { calculateIncomeAdjustmentDeduction } from './income-adjustment.js';
  import { calculateEmployeeIncome, calculateFreelanceIncome } from './income-by-type.js';
  import { calculateTakeHome } from './engine.js';
  import { calculateResidentTax } from './resident-tax.js';
  import { calculateNationalHealthInsurance } from './national-health-insurance.js';
  import { calculateNationalPension } from './national-pension.js';

  const results = [];

  function assertEqual(category, label, expected, actual, source) {
    const pass = expected === actual;
    results.push({ category, label, expected, actual, pass, source });
  }

  async function loadRates(municipalityCode = '12203') {
    const base = '../data/rates/2026/';
    const [
      incomeTaxBrackets, salaryIncomeDeduction, basicDeduction, spousalDeduction,
      dependentDeduction, residentTaxStandard, employeesPension, employmentInsurance, kyokaiKenpoChiba,
      nationalPension, municipalities
    ] = await Promise.all([
      fetch(base + 'income-tax-brackets.json').then(r => r.json()),
      fetch(base + 'salary-income-deduction.json').then(r => r.json()),
      fetch(base + 'basic-deduction.json').then(r => r.json()),
      fetch(base + 'spousal-deduction.json').then(r => r.json()),
      fetch(base + 'dependent-deduction.json').then(r => r.json()),
      fetch(base + 'resident-tax-standard.json').then(r => r.json()),
      fetch(base + 'employees-pension.json').then(r => r.json()),
      fetch(base + 'employment-insurance.json').then(r => r.json()),
      fetch(base + 'kyokai-kenpo/chiba.json').then(r => r.json()),
      fetch(base + 'national-pension.json').then(r => r.json()),
      fetch('../data/municipalities/index.json').then(r => r.json())
    ]);
    const municipality = municipalities.municipalities.find(m => m.municipalityCode === municipalityCode);
    const nationalHealthInsurance = municipality.nationalHealthInsuranceStatus === 'confirmed'
      ? await fetch('../data/' + municipality.nationalHealthInsuranceFile).then(r => r.json())
      : null;
    return {
      incomeTaxBrackets, salaryIncomeDeduction, basicDeduction, spousalDeduction,
      dependentDeduction, residentTaxStandard, employeesPension, employmentInsurance,
      kyokaiKenpo: kyokaiKenpoChiba, nationalPension,
      nationalHealthInsurance
    };
  }

  async function run() {
    const rates = await loadRates();

    // --- 国税庁の公式計算例(令和7年分 年末調整のしかた 109.pdf) ---
    // 例1: 給与所得控除後の給与等の金額の計算(37ページ)。660万円超帯は令和7年分・令和8年分で
    // 速算式が共通のため、令和8年分データでも同じ結果になるはず。
    {
      const income = 7654321;
      const deduction = lookupSalaryIncomeDeduction(income, rates.salaryIncomeDeduction);
      const actual = Math.max(0, income - deduction);
      assertEqual(
        '国税庁公式計算例',
        '給与所得控除後の給与等の金額(給与収入7,654,321円)',
        5788888,
        actual,
        '令和7年分 年末調整のしかた p.36「給与所得控除後の給与等の金額の計算」例'
      );
    }

    // 例2: 算出所得税額の計算(38ページ)。課税給与所得金額2,696,000円は10%区分(控除97,500円)。
    {
      const taxableIncome = 2696000;
      const bracket = rates.incomeTaxBrackets.brackets.find(
        b => b.max === null || taxableIncome <= b.max
      );
      const actual = Math.round(taxableIncome * bracket.rate - bracket.deduction);
      assertEqual(
        '国税庁公式計算例',
        '算出所得税額(課税給与所得金額2,696,000円)',
        172100,
        actual,
        '令和7年分 年末調整のしかた p.38「課税給与所得金額に対する算出所得税額の計算」例'
      );
    }

    // 例3: 所得金額調整控除の計算(37ページ)。給与収入850万円超、23歳未満の扶養親族ありを想定。
    {
      const income = 8765432;
      const actual = calculateIncomeAdjustmentDeduction(income, [10]); // 23歳未満の子を1人と仮定
      assertEqual(
        '国税庁公式計算例',
        '所得金額調整控除額(給与収入8,765,432円、23歳未満の扶養親族あり)',
        26544,
        actual,
        '令和7年分 年末調整のしかた p.37「所得金額調整控除額の計算」例'
      );
    }

    // --- 住民税 手計算設例(公式計算例が見つからなかったため、確定済み料率で自前計算した検証値) ---
    {
      const input = {
        age: 40, prefectureCode: '12', municipalityCode: '12203',
        numberOfChildren: 0, childrenAges: [], employmentType: 'employee',
        annualIncome: 4000000, spouse: { hasSpouse: false, spouseIncome: null }
      };
      const income = calculateEmployeeIncome(input, rates);
      const r = calculateResidentTax(income.totalIncome, input, 500000, rates);
      assertEqual('手計算設例(住民税)', '設例1: 単身・年収400万円・社保50万円 taxableIncome', 1830000, r.taxableIncome, 'test/calc/resident-tax.test.mjsと同じ設例');
      assertEqual('手計算設例(住民税)', '設例1: incomeLevyBeforeCredit', 183000, r.incomeLevyBeforeCredit, '同上');
      assertEqual('手計算設例(住民税)', '設例1: adjustmentCredit', 0, r.adjustmentCredit, '同上');
      assertEqual('手計算設例(住民税)', '設例1: total', 188000, r.total, '同上');
    }
    {
      const input = {
        age: 42, prefectureCode: '12', municipalityCode: '12203',
        numberOfChildren: 1, childrenAges: [17], employmentType: 'employee',
        annualIncome: 6000000, spouse: { hasSpouse: true, spouseIncome: 0 }
      };
      const income = calculateEmployeeIncome(input, rates);
      const r = calculateResidentTax(income.totalIncome, input, 800000, rates);
      assertEqual('手計算設例(住民税)', '設例2: 配偶者・子1人・年収600万円・社保80万円 taxableIncome', 2470000, r.taxableIncome, 'test/calc/resident-tax.test.mjsと同じ設例');
      assertEqual('手計算設例(住民税)', '設例2: incomeLevyBeforeCredit', 247000, r.incomeLevyBeforeCredit, '同上');
      assertEqual('手計算設例(住民税)', '設例2: adjustmentCredit', 2500, r.adjustmentCredit, '同上');
      assertEqual('手計算設例(住民税)', '設例2: total', 249500, r.total, '同上');
    }

    // --- フリーランス: 国民健康保険料 手計算設例(市川市) ---
    {
      const input = {
        age: 38, prefectureCode: '12', municipalityCode: '12203',
        numberOfChildren: 0, childrenAges: [], employmentType: 'freelance',
        annualIncome: 5000000, spouse: { hasSpouse: false, spouseIncome: null }
      };
      const r = calculateNationalHealthInsurance(5000000, input, rates.nationalHealthInsurance);
      assertEqual('手計算設例(国保・市川市)', '設例A: 単身38歳・年収500万円 medical', 375150, r.medical, 'assessableIncome=4,570,000で手計算');
      assertEqual('手計算設例(国保・市川市)', '設例A: support', 95630, r.support, '同上');
      assertEqual('手計算設例(国保・市川市)', '設例A: care(40歳未満のため0円)', 0, r.care, '同上');
      assertEqual('手計算設例(国保・市川市)', '設例A: childSupport', 12511, r.childSupport, '同上');
      assertEqual('手計算設例(国保・市川市)', '設例A: total', 483291, r.total, '同上');
    }
    {
      const input = {
        age: 45, prefectureCode: '12', municipalityCode: '12203',
        numberOfChildren: 2, childrenAges: [10, 20], employmentType: 'freelance',
        annualIncome: 6000000, spouse: { hasSpouse: true, spouseIncome: 0 }
      };
      const r = calculateNationalHealthInsurance(6000000, input, rates.nationalHealthInsurance);
      assertEqual('手計算設例(国保・市川市)', '設例B: 配偶者・子2人(10歳,20歳)・45歳・年収600万円 medical', 486150, r.medical, 'assessableIncome=5,570,000、世帯4人で手計算');
      assertEqual('手計算設例(国保・市川市)', '設例B: support', 141030, r.support, '同上');
      assertEqual('手計算設例(国保・市川市)', '設例B: care(45歳のため対象)', 127785, r.care, '同上');
      assertEqual('手計算設例(国保・市川市)', '設例B: childSupport(20歳の子は大人扱い)', 18911, r.childSupport, '同上');
      assertEqual('手計算設例(国保・市川市)', '設例B: total', 773876, r.total, '同上');
    }

    // --- フリーランス: 国民年金保険料 ---
    {
      const r1 = calculateNationalPension(
        { age: 38, spouse: { hasSpouse: false, spouseIncome: null } },
        rates.nationalPension
      );
      assertEqual('国民年金', '38歳・配偶者なし: 本人分', 215040, r1.selfAnnual, '17,920円×12');
      assertEqual('国民年金', '38歳・配偶者なし: total', 215040, r1.total, '同上');

      const r2 = calculateNationalPension(
        { age: 45, spouse: { hasSpouse: true, spouseIncome: 0 } },
        rates.nationalPension
      );
      assertEqual('国民年金', '45歳・配偶者あり: total(本人+配偶者)', 430080, r2.total, '17,920円×12×2');

      const r3 = calculateNationalPension(
        { age: 65, spouse: { hasSpouse: false, spouseIncome: null } },
        rates.nationalPension
      );
      assertEqual('国民年金', '65歳(60歳以上のため対象外): 本人分', 0, r3.selfAnnual, '第1号被保険者は20〜59歳');
    }

    // --- フリーランス: エンジン全体の内部整合性チェック ---
    {
      const input = {
        age: 38, prefectureCode: '12', municipalityCode: '12203',
        numberOfChildren: 0, childrenAges: [], employmentType: 'freelance',
        annualIncome: 5000000, spouse: { hasSpouse: false, spouseIncome: null }
      };
      let ok = true;
      let detail = '';
      try {
        const r = calculateTakeHome(input, rates);
        const sumsMatch = input.annualIncome - r.incomeTax.total - r.residentTax.total - r.socialInsurance.total === r.takeHomeAnnual;
        ok = r.takeHomeAnnual > 0 && r.takeHomeAnnual < input.annualIncome && sumsMatch;
        detail = `手取り年額=${r.takeHomeAnnual}円, 所得税=${r.incomeTax.total}円, 住民税=${r.residentTax.total}円, 国保+国民年金=${r.socialInsurance.total}円`;
      } catch (e) {
        ok = false;
        detail = 'エラー: ' + e.message;
      }
      results.push({
        category: '内部整合性(参考)',
        label: '市川市・フリーランス・単身・年収500万円',
        expected: '例外なく計算完了し、0<手取り<年収、内訳の合計が一致',
        actual: detail,
        pass: ok,
        source: '公式計算例ではない。エンジン全体が動くことの確認用'
      });
    }

    // --- 内部整合性チェック(公式の網羅例ではないが、エンジン全体が例外なく動作することの確認) ---
    {
      const input = {
        age: 38,
        prefectureCode: '12',
        municipalityCode: '12203',
        numberOfChildren: 2,
        childrenAges: [4, 7],
        employmentType: 'employee',
        annualIncome: 5000000,
        spouse: { hasSpouse: true, spouseIncome: 1000000 }
      };
      let ok = true;
      let detail = '';
      try {
        const r = calculateTakeHome(input, rates);
        ok = r.takeHomeAnnual > 0 && r.takeHomeAnnual < input.annualIncome;
        detail = `手取り年額=${r.takeHomeAnnual}円, 所得税=${r.incomeTax.total}円, 住民税=${r.residentTax.total}円, 社保=${r.socialInsurance.total}円`;
      } catch (e) {
        ok = false;
        detail = 'エラー: ' + e.message;
      }
      results.push({
        category: '内部整合性(参考)',
        label: '千葉県市川市・会社員・年収500万円(モックアップ想定ケース)',
        expected: '例外なく計算完了し、0<手取り<年収',
        actual: detail,
        pass: ok,
        source: '公式計算例ではない。エンジン全体が動くことの確認用'
      });
    }

    render();
  }

  function render() {
    const tbody = document.getElementById('result-body');
    let passCount = 0;
    results.forEach((r, i) => {
      const tr = document.createElement('tr');
      tr.className = r.pass ? 'pass' : 'fail';
      if (r.pass) passCount++;
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td>${r.category}</td>
        <td>${r.label}<br><span style="color:#5a625c;font-size:11px">${r.source}</span></td>
        <td>${r.expected}</td>
        <td>${r.actual}</td>
        <td class="result">${r.pass ? 'PASS' : 'FAIL'}</td>
      `;
      tbody.appendChild(tr);
    });
    document.getElementById('summary').textContent = `${passCount} / ${results.length} 件成功`;
  }

  run().catch(e => {
    document.getElementById('summary').textContent = '実行エラー: ' + e.message;
    console.error(e);
  });
</script>
</body>
</html>
